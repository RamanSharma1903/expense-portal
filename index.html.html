
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:2rem 1rem 3rem}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
  .brand-icon{width:36px;height:36px;background:var(--color-background-info);border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center}
  .brand-icon svg{width:18px;height:18px;stroke:var(--color-text-info);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .brand-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
  .brand-sub{font-size:12px;color:var(--color-text-secondary)}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem}
  .field{margin-bottom:1.25rem}
  .label{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;letter-spacing:0.02em;text-transform:uppercase}
  input,select,textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:14px}
  textarea{resize:vertical;min-height:72px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .drop-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:2rem;text-align:center;cursor:pointer;transition:background 0.15s;position:relative}
  .drop-zone:hover,.drop-zone.over{background:var(--color-background-secondary)}
  .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-icon{margin:0 auto 8px;width:32px;height:32px;background:var(--color-background-secondary);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .drop-icon svg{width:16px;height:16px;stroke:var(--color-text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .drop-text{font-size:13px;color:var(--color-text-secondary)}
  .drop-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:4px}
  .file-preview{display:none;align-items:center;gap:8px;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-top:8px;font-size:13px}
  .file-preview.show{display:flex}
  .file-preview svg{width:14px;height:14px;flex-shrink:0;stroke:var(--color-text-success);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-text-primary)}
  .file-size{font-size:11px;color:var(--color-text-secondary);font-family:'DM Mono',monospace}
  .submit-btn{width:100%;padding:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer;margin-top:0.5rem;transition:opacity 0.15s}
  .submit-btn:hover{opacity:0.85}
  .submit-btn:active{opacity:0.7}
  .submit-btn:disabled{opacity:0.4;cursor:not-allowed}
  .success-card{display:none;background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center}
  .success-card.show{display:block}
  .success-check{width:44px;height:44px;background:var(--color-background-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .success-check svg{width:20px;height:20px;stroke:var(--color-text-success);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .success-title{font-size:15px;font-weight:500;color:var(--color-text-success);margin-bottom:4px}
  .success-sub{font-size:13px;color:var(--color-text-secondary)}
  .ref{font-family:'DM Mono',monospace;font-size:11px;color:var(--color-text-tertiary);margin-top:8px}
  .divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:1.25rem 0}
  .section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:1rem}
  .currency-wrap{position:relative}
  .currency-wrap input{padding-left:28px}
  .currency-sym{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--color-text-secondary);pointer-events:none}
  .note{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;display:flex;gap:5px;align-items:flex-start}
  .note svg{width:11px;height:11px;flex-shrink:0;margin-top:1px;stroke:var(--color-text-tertiary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .date-error{display:none;font-size:12px;color:var(--color-text-danger);margin-top:5px;align-items:center;gap:4px}
  .date-error.show{display:flex}
  .date-error svg{width:12px;height:12px;flex-shrink:0;stroke:var(--color-text-danger);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  input.invalid{border-color:var(--color-border-danger) !important;outline-color:var(--color-border-danger)}
  .another-btn{margin-top:12px;font-size:13px;color:var(--color-text-info);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;text-decoration:underline}
  .deadline-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-warning);background:var(--color-background-warning);border-radius:var(--border-radius-md);padding:3px 8px;margin-bottom:8px}
  .deadline-badge svg{width:11px;height:11px;stroke:var(--color-text-warning);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </div>
    <div>
      <div class="brand-name">Expense Portal</div>
      <div class="brand-sub">Submit bills for reimbursement</div>
    </div>
  </div>

  <div class="card" id="form-card">
    <div class="section-title">Your details</div>
    <div class="field">
      <label class="label">Full name</label>
      <input type="text" id="name" placeholder="Priya Sharma" />
    </div>
    <div class="field">
      <label class="label">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" />
    </div>

    <hr class="divider">
    <div class="section-title">Expense details</div>

    <div class="row">
      <div class="field">
        <label class="label">Category</label>
        <select id="category">
          <option value="">Select...</option>
          <option>Travel & Transport</option>
          <option>Accommodation</option>
          <option>Meals & Entertainment</option>
          <option>Software & Subscriptions</option>
          <option>Training & Conferences</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label class="label">Amount</label>
        <div class="currency-wrap">
          <span class="currency-sym">₹</span>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <div class="field">
      <label class="label">Date of expense</label>
      <div class="deadline-badge">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        Must be within the last 60 days
      </div>
      <input type="date" id="expdate" oninput="validateDate(this)" />
      <div class="date-error" id="date-error">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="date-error-msg"></span>
      </div>
    </div>

    <div class="field">
      <label class="label">Description</label>
      <textarea id="desc" placeholder="Brief description of the expense and business purpose…"></textarea>
    </div>

    <hr class="divider">
    <div class="section-title">Attach bill / receipt</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*,.pdf" />
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      </div>
      <div class="drop-text">Click to upload or drag & drop</div>
      <div class="drop-hint">PDF, JPG, PNG up to 10MB</div>
    </div>
    <div class="file-preview" id="file-preview">
      <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
      <span class="file-name" id="file-name"></span>
      <span class="file-size" id="file-size"></span>
    </div>
    <div class="note">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Original bill or a clear photo is required for reimbursement
    </div>

    <hr class="divider">
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Submit expense</button>
  </div>

  <div class="success-card" id="success-card">
    <div class="success-check">
      <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
    </div>
    <div class="success-title">Expense submitted!</div>
    <div class="success-sub" id="success-msg"></div>
    <div class="ref" id="ref-num"></div>
    <button class="another-btn" onclick="resetForm()">Submit another expense</button>
  </div>
</div>

<script>
  const fi = document.getElementById('file-input');
  const dz = document.getElementById('drop-zone');
  const fp = document.getElementById('file-preview');

  function getDateBounds() {
    const today = new Date(); today.setHours(0,0,0,0);
    const earliest = new Date(today); earliest.setDate(earliest.getDate() - 60);
    const fmt = d => d.toISOString().split('T')[0];
    return { min: fmt(earliest), max: fmt(today), todayObj: today, earliestObj: earliest };
  }

  function validateDate(input) {
    const { todayObj, earliestObj } = getDateBounds();
    const err = document.getElementById('date-error');
    const errMsg = document.getElementById('date-error-msg');
    input.classList.remove('invalid');
    err.classList.remove('show');
    if (!input.value) return true;
    const chosen = new Date(input.value + 'T00:00:00');
    if (chosen > todayObj) {
      input.classList.add('invalid');
      errMsg.textContent = "Expense date can't be in the future";
      err.classList.add('show'); return false;
    }
    if (chosen < earliestObj) {
      input.classList.add('invalid');
      const days = Math.floor((todayObj - chosen) / 86400000);
      errMsg.textContent = `This date is ${days} days ago — submissions must be within 60 days of the expense`;
      err.classList.add('show'); return false;
    }
    return true;
  }

  window.addEventListener('DOMContentLoaded', () => {
    const { min, max } = getDateBounds();
    const el = document.getElementById('expdate');
    el.min = min; el.max = max;
  });

  fi.addEventListener('change', () => handleFile(fi.files[0]));
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) { fi.files = e.dataTransfer.files; handleFile(f); }
  });

  function handleFile(f) {
    if (!f) return;
    fp.classList.add('show');
    document.getElementById('file-name').textContent = f.name;
    const kb = f.size / 1024;
    document.getElementById('file-size').textContent = kb > 1024 ? (kb/1024).toFixed(1)+'MB' : Math.round(kb)+'KB';
  }

  function handleSubmit() {
    // Show success screen
	document.getElementById('form-card').style.display = 'none';
	document.getElementById('success-card').classList.add('show');
	const ref = 'EXP-' + Date.now().toString(36).toUpperCase();
	document.getElementById('ref-num').textContent = 'Reference: ' + ref;
	document.getElementById('success-msg').textContent =
  	name.split(' ')[0] + ', your expense has been logged. Your manager will be notified shortly.';
// Open the backend Forms link in a new tab for actual submission
window.open('PASTE_YOUR_MICROSOFT_FORMS_URL_HERE', '_blank');
  }

  function resetForm() {
    document.getElementById('success-card').classList.remove('show');
    document.getElementById('form-card').style.display = 'block';
    ['name','email','amount','desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('category').value = '';
    const ed = document.getElementById('expdate');
    ed.value = ''; ed.classList.remove('invalid');
    document.getElementById('date-error').classList.remove('show');
    document.getElementById('file-preview').classList.remove('show');
    fi.value = '';
    const btn = document.getElementById('submit-btn');
    btn.disabled = false; btn.textContent = 'Submit expense';
  }
</script>
